services:
  cortex:
    build:
      context: ..
      dockerfile: cortex/Dockerfile
    image: nyx-cortex:latest
    restart: unless-stopped
    ports:
      - "18789:18789"
    environment:
      # GitHub token — lets the agent use `gh` to open issues, PRs, comment, etc.
      # Set in .env file (gitignored): GITHUB_TOKEN=ghp_...
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    volumes:
      # Config — edit on Mac, live-reloaded by openclaw (directory mount avoids EBUSY inode locks)
      - ../secrets:/config
      # State — all openclaw databases, agent sandboxes, sessions, downloaded files
      # This is your backup: ~/projects/nyx/data/ on Mac
      - ../data:/data
    # llama.cpp lives on the local network — reachable directly by IP, no special routing needed
