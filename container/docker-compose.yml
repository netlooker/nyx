services:
  nyx:
    build:
      context: ..
      dockerfile: container/Dockerfile
      args:
        NYX_NIX_SYSTEM: ${NYX_NIX_SYSTEM:-aarch64-linux}
        OPENCLAW_VERSION: ${OPENCLAW_VERSION:-latest}
        QWEN_CODE_VERSION: ${QWEN_CODE_VERSION:-latest}
        SYNAPSE_VERSION: ${SYNAPSE_VERSION:-flake-pinned}
        ENABLE_SBOM: ${ENABLE_SBOM:-false}
        SBOM_PATH: ${SBOM_PATH:-}
    image: nyx:latest
    restart: unless-stopped
    ports:
      - "18789:18789"
    volumes:
      # Config — edit on Mac, live-reloaded by openclaw (directory mount avoids EBUSY inode locks)
      - ../secrets:/config
      # State — all openclaw databases, agent sandboxes, sessions, downloaded files
      # This is your backup: ~/projects/nyx/data/ on Mac
      - ../data:/data
    env_file:
      - ../secrets/.env
    # llama.cpp lives on the local network — reachable directly by IP, no special routing needed

  # Private metasearch sidecar for future Sonar integration.
  # Keep this on the internal compose network only: agents should reach it as
  # http://searxng:8080, not via a host-exposed port.
  searxng:
    image: docker.io/searxng/searxng@sha256:4da2820fd56920bf05303183b2f3a8c8cce18fcbcd88526cae31bc039b2d4dd1
    restart: unless-stopped
    volumes:
      - ./searxng:/etc/searxng
      - searxng-cache:/var/cache/searxng
    environment:
      SEARXNG_BASE_URL: http://searxng:8080/

volumes:
  searxng-cache:
