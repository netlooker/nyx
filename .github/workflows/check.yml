name: check

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      NYX_NIX_SYSTEM: x86_64-linux
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        run: curl -sSfL https://artifacts.nixos.org/nix-installer | sh -s -- install

      - name: Run repo checks
        run: nix develop --command just check

      - name: Build container image
        run: nix develop --command just build

      - name: Verify image labels
        run: |
          labels="$(docker image inspect nyx:latest --format '{{json .Config.Labels}}')"
          echo "$labels"
          echo "$labels" | grep -q '"io.github.netlooker.nyx.build-info":"/app/build-info.json"'
          echo "$labels" | grep -q '"io.github.netlooker.nyx.nix-system":"x86_64-linux"'
          echo "$labels" | grep -q '"io.github.netlooker.nyx.sbom.enabled":"false"'
          echo "$labels" | grep -q '"io.github.netlooker.nyx.openclaw.version":'
          echo "$labels" | grep -q '"io.github.netlooker.nyx.qwen-code.version":'

      - name: Verify build metadata artifact
        run: |
          cid="$(docker create nyx:latest)"
          docker cp "$cid:/app/build-info.json" ./build-info.json
          docker cp "$cid:/app/sbom-status.json" ./sbom-status.json
          docker rm "$cid"
          cat build-info.json
          cat sbom-status.json
          grep -q '"resolved"' build-info.json
          grep -q '"enabled": false' build-info.json
